<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultor de Personagens</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Consultor de Personagens</h1>
        <p>Encontre dados sobre seus personagens favoritos</p>
    </header>

    <main>
        <section class="search-section glass-effect">
            <input type="text" id="character-input" placeholder="Ex: Spider-Man, Hulk, Batman, Joker...">
            <button id="search-btn">Buscar</button>
        </section>

        <section id="results-section" class="results-container">
            </section>
    </main>

    <footer>
        <p>Projeto para o Estudo Dirigido 2</p>
        <p>Dados fornecidos pela SuperHero API.</p>
    </footer>

    <script type="module" src="script.js"></script>
</body>
</html>
